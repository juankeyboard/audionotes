name: audionotes
description: "Graba audio. Obtén transcripción. Todo organizado en tu Google Drive."
publish_to: 'none'

version: 0.2.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Inteligencia Artificial (Gemini)
  google_generative_ai: ^0.4.5

  # Gestión de Estado
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Persistencia Local
  shared_preferences: ^2.3.2

  # Audio
  record: ^6.2.0
  audioplayers: ^6.1.0

  # Utilidades
  path_provider: ^2.1.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
